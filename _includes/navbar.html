<script>
    // --- Theme Toggle Logic ---
    const iconSun = document.getElementById('icon-sun');
    const iconMoon = document.getElementById('icon-moon');
    const themeToggleBtn = document.getElementById('theme-toggle');

    // 1. Set the correct icon on initial load
    // default.html already checked localStorage and added '.dark' to the HTML tag if needed.
    if (document.documentElement.classList.contains('dark')) {
        iconMoon.classList.remove('hidden'); // Show Moon in Dark Mode
    } else {
        iconSun.classList.remove('hidden');  // Show Sun in Light Mode
    }

    // 2. Handle clicks
    themeToggleBtn.addEventListener('click', function() {
        // Swap the icons
        iconSun.classList.toggle('hidden');
        iconMoon.classList.toggle('hidden');

        // Swap the theme and save preference
        if (document.documentElement.classList.contains('dark')) {
            document.documentElement.classList.remove('dark');
            localStorage.theme = 'light';
        } else {
            document.documentElement.classList.add('dark');
            localStorage.theme = 'dark';
        }

        document.documentElement.classList.add('theme-transitioning');
        setTimeout(() => document.documentElement.classList.remove('theme-transitioning'), 300);
    });

    // --- Mobile Menu Logic ---
    const mobileMenuBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    mobileMenuBtn.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
    });
</script>
